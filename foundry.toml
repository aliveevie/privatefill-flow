[profile.default]
src = "contracts"
test = "test/foundry"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./" }]
remappings = [
  "@fhenixprotocol/cofhe-contracts/=lib/cofhe-contracts/contracts/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]
